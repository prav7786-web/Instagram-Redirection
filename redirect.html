<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Loading...</title>
</head>
<body>
  <p>Please wait while you are being redirected...</p>

  <script>
    (function () {
      const analyticsEndpoint = "https://your-analytics-api.com/collect"; // must be HTTPS and CORS-enabled
      const destinationUrl = "https://example.com";

      // Helper: small privacy-preserving bucketing for fingerprinting-sensitive fields
      function bucketDeviceMemory(mem) {
        if (!mem || typeof mem !== "number") return "unknown";
        if (mem <= 1) return "<=1";
        if (mem <= 2) return "2";
        if (mem <= 4) return "4";
        if (mem <= 8) return "8";
        return ">=16";
      }

      function safeString(v) {
        return typeof v === "string" ? v : String(v || "");
      }

      // Build metadata (avoid collecting PII)
      const userData = {
        timestamp: new Date().toISOString(),
        language: (navigator.languages && navigator.languages[0]) || navigator.language || "unknown",
        // round/respect privacy for numeric fields
        screenResolution: (window.screen && window.screen.width && window.screen.height)
          ? `${window.screen.width}x${window.screen.height}`
          : "unknown",
        viewportSize: `${window.innerWidth || 0}x${window.innerHeight || 0}`,
        timeZone: (Intl && Intl.DateTimeFormat && Intl.DateTimeFormat().resolvedOptions)
          ? (Intl.DateTimeFormat().resolvedOptions().timeZone || "unknown")
          : "unknown",
        deviceMemory: bucketDeviceMemory(navigator.deviceMemory),
        hardwareConcurrency: navigator.hardwareConcurrency || "unknown",
        platform: safeString(navigator.platform || "unknown"),
        // userAgent is commonly collected but increases fingerprinting risk;
        // include only if your privacy policy covers it.
        userAgent: typeof navigator.userAgent === "string" ? navigator.userAgent : "unknown"
      };

      const jsonString = JSON.stringify(userData);
      const redirectNow = () => {
        // use replace to avoid creating a history entry
        window.location.replace(destinationUrl);
      };

      // Primary: use sendBeacon where available (works well for unload/redirect)
      try {
        if (navigator && typeof navigator.sendBeacon === "function") {
          // send a Blob with explicit application/json so server sees JSON
          const blob = new Blob([jsonString], { type: "application/json" });
          const ok = navigator.sendBeacon(analyticsEndpoint, blob);
          // sendBeacon is asynchronous and returns immediately; proceed to redirect.
          // If it returns false, we'll fall back below (but do not block redirect)
          return redirectNow();
        }
      } catch (e) {
        // fall through to fetch fallback
        console.warn("sendBeacon failed, falling back to fetch:", e);
      }

      // Fallback: fetch with keepalive and a short timeout so we don't stall the user
      const fetchWithTimeout = (url, opts = {}, timeoutMs = 800) => {
        return new Promise((resolve) => {
          let done = false;
          const timer = setTimeout(() => {
            if (!done) {
              done = true;
              resolve({ ok: false, timeout: true });
            }
          }, timeoutMs);

          fetch(url, opts)
            .then((res) => {
              if (!done) {
                done = true;
                clearTimeout(timer);
                resolve({ ok: res.ok, timeout: false });
              }
            })
            .catch(() => {
              if (!done) {
                done = true;
                clearTimeout(timer);
                resolve({ ok: false, timeout: false });
              }
            });
        });
      };

      // Use keepalive: true; note that some browsers have size limits (~64KB)
      fetchWithTimeout(analyticsEndpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: jsonString,
        keepalive: true
      }, 800).finally(() => {
        // Ensure redirect even if fetch hangs
        redirectNow();
      });

      // Safety net: in case something unexpected prevents the above from running
      setTimeout(redirectNow, 2000);
    })();
  </script>
</body>
</html>
